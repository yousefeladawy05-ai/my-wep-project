<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Course</title>
    <link rel="stylesheet" href="go2.css">
</head>
<body>
    <header>
        <h1>Add Course</h1>
     </header>

    <nav>
       <a  href="index.html"> Home</a>
        <a  href="My Courses.html"> My Courses</a>
        <a  href="Add  Course.html">Add Course </a>
        <a  href="Contact Us.html">Contact Us</a>
    </nav>

    <main>

        <section>

            <h2>New course</h2>

            <form action="#">

                <label for="name">Course name:</label><br>
                <input type="text" id="name" placeholder="Name of the material" required><br>
                <label for="teacher">Lecturer's name:</label><br>
                <input type="text" id="instructor" placeholder="Doctor's name" required><br>
                <label for="houres">Approved hours:</label><br>
                <input type="number" id="houres" min="2" max="3"><br>
                <label for="notes">Additional note:</label>
                <textarea id="notes" rows="3" placeholder="Write your feedback here"></textarea><br><br>
                <button type="submit">Save the course</button>
             
            </form>

        </section>

    </main>
    <footer>
         <P> ©2026 YOUSEF</P>
    </footer>
    
</body>
</html>
